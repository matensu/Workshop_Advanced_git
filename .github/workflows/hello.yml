# .github/workflows/ci.yml
name: CI Pipeline          # Name displayed on GitHub

on:                        # Triggers — when this workflow starts
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:                      # Set of jobs (run in parallel by default)
  test:                    # Job name
    runs-on: ubuntu-latest

    steps:
      - run: gh pr comment "$PR_URL" --body "Hello, GitHub Actions!"

      - name: Print branch name
        run: |
          echo "Current branch: ${{ github.sha }}"
