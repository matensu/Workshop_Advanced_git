<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Web Project</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <header>
        <h1>Welcome to My Advanced Web Project</h1>
        <p>A modern interactive website with scrollable content</p>
    </header>

        <section class="content">
            <h2>Hello World</h2>

    <footer>
